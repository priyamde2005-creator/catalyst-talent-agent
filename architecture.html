<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Catalyst — Architecture Diagram</title>
<style>
  body { background: #080b12; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; font-family: 'Segoe UI', sans-serif; }
  h1 { color: #00e5ff; font-size: 22px; margin-bottom: 8px; letter-spacing: 1px; }
  p { color: #64748b; font-size: 13px; margin-bottom: 32px; }
  svg text { font-family: 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<h1>Catalyst — AI Talent Agent Architecture</h1>
<p>End-to-end flow: Job Description → AI Processing → Ranked Shortlist</p>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- RECRUITER -->
  <rect x="20" y="220" width="130" height="64" rx="10" fill="#0e1320" stroke="#1e2740" stroke-width="1"/>
  <text x="85" y="245" text-anchor="middle" fill="#10b981" font-size="13" font-weight="600">👔 Recruiter</text>
  <text x="85" y="265" text-anchor="middle" fill="#64748b" font-size="11">Pastes Job Description</text>
  <text x="85" y="278" text-anchor="middle" fill="#64748b" font-size="11">into the UI</text>

  <!-- Arrow recruiter → frontend -->
  <line x1="150" y1="252" x2="185" y2="252" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="167" y="244" text-anchor="middle" fill="#00e5ff" font-size="10">JD text</text>

  <!-- FRONTEND -->
  <rect x="185" y="190" width="140" height="120" rx="10" fill="#0e1320" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="255" y="212" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">FRONTEND</text>
  <text x="255" y="230" text-anchor="middle" fill="#64748b" font-size="11">index.html</text>
  <line x1="200" y1="238" x2="310" y2="238" stroke="#1e2740" stroke-width="1"/>
  <text x="255" y="255" text-anchor="middle" fill="#94a3b8" font-size="11">• JD input textarea</text>
  <text x="255" y="272" text-anchor="middle" fill="#94a3b8" font-size="11">• Candidate dashboard</text>
  <text x="255" y="289" text-anchor="middle" fill="#94a3b8" font-size="11">• Score visualizations</text>

  <!-- Arrow frontend → backend -->
  <line x1="325" y1="252" x2="365" y2="252" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="345" y="243" text-anchor="middle" fill="#00e5ff" font-size="10">POST</text>
  <text x="345" y="264" text-anchor="middle" fill="#00e5ff" font-size="10">/analyze</text>

  <!-- BACKEND CONTAINER -->
  <rect x="365" y="60" width="360" height="430" rx="14" fill="#0a0f1a" stroke="#1e2740" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="545" y="86" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">⚙️ FastAPI Backend (Python)</text>
  <line x1="380" y1="95" x2="710" y2="95" stroke="#1e2740" stroke-width="1"/>

  <!-- JD PARSER -->
  <rect x="385" y="110" width="150" height="64" rx="8" fill="#0e1320" stroke="#f59e0b" stroke-width="1"/>
  <text x="460" y="132" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">📋 JD Parser</text>
  <text x="460" y="150" text-anchor="middle" fill="#64748b" font-size="11">Extracts: skills, experience,</text>
  <text x="460" y="163" text-anchor="middle" fill="#64748b" font-size="11">role type, requirements</text>

  <!-- Arrow JD Parser → Match Engine -->
  <line x1="460" y1="174" x2="460" y2="204" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MATCH ENGINE -->
  <rect x="385" y="204" width="150" height="64" rx="8" fill="#0e1320" stroke="#00e5ff" stroke-width="1"/>
  <text x="460" y="226" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="600">🎯 Match Engine</text>
  <text x="460" y="244" text-anchor="middle" fill="#64748b" font-size="11">Scores all 20 candidates</text>
  <text x="460" y="257" text-anchor="middle" fill="#64748b" font-size="11">→ Match Score (0–100)</text>

  <!-- Arrow Match → Conversation -->
  <line x1="460" y1="268" x2="460" y2="298" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- CONVERSATION SIMULATOR -->
  <rect x="385" y="298" width="150" height="64" rx="8" fill="#0e1320" stroke="#10b981" stroke-width="1"/>
  <text x="460" y="320" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600">💬 Conv Simulator</text>
  <text x="460" y="338" text-anchor="middle" fill="#64748b" font-size="11">3-msg recruiter chat</text>
  <text x="460" y="351" text-anchor="middle" fill="#64748b" font-size="11">→ Interest Score (0–100)</text>

  <!-- Arrow Conv → Ranker -->
  <line x1="460" y1="362" x2="460" y2="392" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- RANKER -->
  <rect x="385" y="392" width="150" height="64" rx="8" fill="#0e1320" stroke="#ef4444" stroke-width="1"/>
  <text x="460" y="414" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">🏆 Ranker</text>
  <text x="460" y="432" text-anchor="middle" fill="#64748b" font-size="11">0.6×Match + 0.4×Interest</text>
  <text x="460" y="445" text-anchor="middle" fill="#64748b" font-size="11">Top 5 shortlisted</text>

  <!-- GROQ AI -->
  <rect x="565" y="150" width="140" height="72" rx="8" fill="#0e1320" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="635" y="172" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">🤖 Groq AI</text>
  <text x="635" y="190" text-anchor="middle" fill="#64748b" font-size="11">llama-3.3-70b-versatile</text>
  <text x="635" y="207" text-anchor="middle" fill="#64748b" font-size="11">Free API — Fast inference</text>

  <!-- Dashed arrows from AI to modules -->
  <line x1="565" y1="175" x2="537" y2="150" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <line x1="565" y1="186" x2="537" y2="236" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <line x1="565" y1="210" x2="537" y2="330" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

  <!-- CANDIDATES DB -->
  <rect x="565" y="310" width="140" height="64" rx="8" fill="#0e1320" stroke="#64748b" stroke-width="1"/>
  <text x="635" y="332" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">🗄️ Candidate DB</text>
  <text x="635" y="350" text-anchor="middle" fill="#64748b" font-size="11">20 synthetic profiles</text>
  <text x="635" y="363" text-anchor="middle" fill="#64748b" font-size="11">candidates.json</text>

  <!-- Arrow DB → Match Engine -->
  <line x1="565" y1="340" x2="537" y2="260" stroke="#64748b" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

  <!-- Arrow backend → frontend (response) -->
  <path d="M365 424 L345 424 L345 300 L325 300" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-dasharray="5 2"/>
  <text x="348" y="416" text-anchor="middle" fill="#10b981" font-size="10">Ranked</text>
  <text x="348" y="428" text-anchor="middle" fill="#10b981" font-size="10">shortlist</text>

  <!-- OUTPUT BOX -->
  <rect x="20" y="390" width="130" height="80" rx="10" fill="#0e1320" stroke="#10b981" stroke-width="1.5"/>
  <text x="85" y="410" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">📊 Output</text>
  <text x="85" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">Top 5 candidates</text>
  <text x="85" y="442" text-anchor="middle" fill="#94a3b8" font-size="10">Match + Interest score</text>
  <text x="85" y="456" text-anchor="middle" fill="#94a3b8" font-size="10">Conversation + reasons</text>

  <!-- Arrow frontend → output -->
  <line x1="255" y1="310" x2="255" y2="340" stroke="#10b981" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="255" y1="340" x2="85" y2="340" stroke="#10b981" stroke-width="1"/>
  <line x1="85" y1="340" x2="85" y2="388" stroke="#10b981" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- SCORING FORMULA BOX -->
  <rect x="365" y="500" width="360" height="40" rx="8" fill="#0e1320" stroke="#f59e0b" stroke-width="1"/>
  <text x="545" y="524" text-anchor="middle" fill="#f59e0b" font-size="12">Combined Score = 0.6 × Match Score + 0.4 × Interest Score</text>
</svg>
</body>
</html>
